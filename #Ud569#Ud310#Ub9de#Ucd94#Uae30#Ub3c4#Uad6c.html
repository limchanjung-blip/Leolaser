<head>

<title>합판 위치 맞추기 도구</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a1a; color:#eee; font-family:sans-serif; padding:10px; }
  h2 { font-size:16px; margin-bottom:6px; }
  .hint { font-size:12px; color:#aaa; margin-bottom:8px; line-height:1.5; }
  #viewport { position:relative; width:100%; max-width:1000px; margin:0 auto; overflow:hidden;
              border:1px solid #444; touch-action:none; background:#000; height:70vh; }
  #stage { position:absolute; top:0; left:0; transform-origin:0 0; }
  #stage img.bg { display:block; }
  #ply-canvas { position:absolute; inset:0; pointer-events:none; }
  .handle { position:absolute; width:14px; height:14px; margin:-7px 0 0 -7px; border-radius:50%;
            background:rgba(255,56,21,0.5); border:1.5px solid #fff; cursor:grab; touch-action:none; z-index:10; }
  .handle::after { content:''; position:absolute; left:50%; top:50%; width:1px; height:1px;
                   background:#fff; box-shadow:0 0 0 0.5px #fff; transform:translate(-50%,-50%); }
  .handle:active { cursor:grabbing; }
  .handle span { position:absolute; top:-15px; left:50%; transform:translateX(-50%);
                 font-size:9px; color:#ff3815; font-weight:bold; text-shadow:0 0 2px #000,0 0 2px #000; white-space:nowrap; }
  .ctrl { max-width:1000px; margin:10px auto; }
  .ctrl button { background:#ff3815; color:#fff; border:none; padding:8px 14px; border-radius:6px; font-size:13px; margin:0 4px 4px 0; cursor:pointer; }
  .ctrl button.alt { background:#444; }
  #out { width:100%; max-width:1000px; margin:8px auto; display:block; background:#000; color:#0f0;
         font-family:monospace; font-size:12px; padding:10px; border:1px solid #444; border-radius:6px; min-height:60px; white-space:pre-wrap; }
  .op-row { max-width:1000px; margin:6px auto; font-size:13px; }
  input[type=range]{ width:160px; vertical-align:middle; }
  .zoom-info { display:inline-block; min-width:48px; font-weight:bold; color:#ff3815; }
</style>

<body>
  <h2>🪵 합판 위치 맞추기 도구</h2>
  <p class="hint">작은 빨간 점 4개(합판 모서리)를 드래그해서 맞추세요. <b>확대</b>하면 더 정밀하게 조정돼요.<br>
  • 확대/축소: 마우스 휠 또는 +/− 버튼 &nbsp; • 화면 이동(확대 시): 빈 곳을 드래그(스페이스 불필요, 점이 아닌 곳)<br>
  TL=뒤왼, TR=뒤오, BR=앞오, BL=앞왼. 다 맞추면 <b>좌표 보기</b> → 복사해서 클로드에게 주세요.</p>

  <div class="ctrl">
    <button onclick="zoomBtn(1.3)">＋ 확대</button>
    <button onclick="zoomBtn(1/1.3)">－ 축소</button>
    <button class="alt" onclick="fitView()">전체보기</button>
    <span style="font-size:12px;margin-left:8px;">배율: <span class="zoom-info" id="zinfo">100%</span></span>
  </div>

  <div id="viewport">
    <div id="stage">
      <img class="bg" id="bg" alt="machine">
      <canvas id="ply-canvas"></canvas>
      <div class="handle" data-i="0"><span>TL 뒤왼</span></div>
      <div class="handle" data-i="1"><span>TR 뒤오</span></div>
      <div class="handle" data-i="2"><span>BR 앞오</span></div>
      <div class="handle" data-i="3"><span>BL 앞왼</span></div>
    </div>
  </div>

  <div class="op-row">합판 투명도: <input type="range" id="opacity" min="20" max="100" value="100"> <span id="opval">100%</span></div>
  <div class="ctrl">
    <button onclick="showCoords()">📋 좌표 보기</button>
    <button class="alt" onclick="resetPts()">점 초기화</button>
  </div>
  <pre id="out">여기에 좌표가 표시됩니다.</pre>

const NW=2000, NH=1105;

const viewport=document.getElementById('viewport');
const stage=document.getElementById('stage');
const bg=document.getElementById('bg'); bg.src=MACHINE;
const canvas=document.getElementById('ply-canvas');
const ctx=canvas.getContext('2d');
const handles=[...document.querySelectorAll('.handle')];
const plyImg=new Image(); plyImg.src=PLY;

let pts=[{x:200,y:430},{x:1015,y:415},{x:830,y:520},{x:140,y:500}];

// view transform: stage가 원본픽셀 크기, scale로 줌, tx/ty로 이동
let scale=1, tx=0, ty=0;

function applyView(){
  stage.style.width=NW+'px';
  stage.style.height=NH+'px';
  bg.style.width=NW+'px';
  canvas.width=NW; canvas.height=NH;
  canvas.style.width=NW+'px'; canvas.style.height=NH+'px';
  stage.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';
  document.getElementById('zinfo').textContent=Math.round(scale*100)+'%';
}
function fitView(){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  scale=Math.min(vw/NW, vh/NH);
  tx=(vw-NW*scale)/2; ty=(vh-NH*scale)/2;
  applyView(); redraw();
}
function zoomBtn(f){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const cx=vw/2, cy=vh/2;
  zoomAt(cx,cy,f);
}
function zoomAt(px,py,f){
  const ox=(px-tx)/scale, oy=(py-ty)/scale;
  scale*=f; scale=Math.max(0.05,Math.min(8,scale));
  tx=px-ox*scale; ty=py-oy*scale;
  applyView(); redraw();
}
viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=viewport.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:1/1.12);
},{passive:false});

// 합판 와프
function drawPly(){
  ctx.clearRect(0,0,NW,NH);
  if(!plyImg.complete) return;
  const sx0=200, sy0=388, sx1=1015, sy1=512;
  const src=[[sx0,sy0],[sx1,sy0],[sx1,sy1],[sx0,sy1]];
  const dst=pts.map(p=>[p.x,p.y]);
  triangle(ctx,plyImg, src[0],src[1],src[2], dst[0],dst[1],dst[2]);
  triangle(ctx,plyImg, src[0],src[2],src[3], dst[0],dst[2],dst[3]);
}
function triangle(ctx,img, s0,s1,s2, d0,d1,d2){
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(d0[0],d0[1]); ctx.lineTo(d1[0],d1[1]); ctx.lineTo(d2[0],d2[1]); ctx.closePath();
  ctx.clip();
  const denom=(s1[0]-s0[0])*(s2[1]-s0[1])-(s2[0]-s0[0])*(s1[1]-s0[1]);
  if(denom===0){ctx.restore();return;}
  const a=((d1[0]-d0[0])*(s2[1]-s0[1])-(d2[0]-d0[0])*(s1[1]-s0[1]))/denom;
  const b=((d2[0]-d0[0])*(s1[0]-s0[0])-(d1[0]-d0[0])*(s2[0]-s0[0]))/denom;
  const c=((d1[1]-d0[1])*(s2[1]-s0[1])-(d2[1]-d0[1])*(s1[1]-s0[1]))/denom;
  const d=((d2[1]-d0[1])*(s1[0]-s0[0])-(d1[1]-d0[1])*(s2[0]-s0[0]))/denom;
  const e=d0[0]-a*s0[0]-b*s0[1];
  const f=d0[1]-c*s0[0]-d*s0[1];
  ctx.transform(a,c,b,d,e,f);
  ctx.drawImage(img,0,0);
  ctx.restore();
}
function placeHandles(){
  handles.forEach(h=>{
    const i=+h.dataset.i;
    h.style.left=pts[i].x+'px';
    h.style.top=pts[i].y+'px';
    // 점 크기를 줌에 반비례 → 화면상 항상 작게
    const sz=12/scale;
    h.style.width=sz+'px'; h.style.height=sz+'px';
    h.style.margin=(-sz/2)+'px 0 0 '+(-sz/2)+'px';
    h.style.borderWidth=(1.5/scale)+'px';
    const sp=h.querySelector('span');
    sp.style.fontSize=(9/scale)+'px';
    sp.style.top=(-15/scale)+'px';
  });
}
function redraw(){ drawPly(); placeHandles(); }

// 드래그: 점 또는 패닝
let dragPt=null, panning=false, panStart=null;
handles.forEach(h=>{
  const start=e=>{ dragPt=+h.dataset.i; e.preventDefault(); e.stopPropagation(); };
  h.addEventListener('mousedown',start);
  h.addEventListener('touchstart',start,{passive:false});
});
viewport.addEventListener('mousedown',e=>{
  if(dragPt!==null) return;
  panning=true; panStart={x:e.clientX-tx, y:e.clientY-ty};
});
viewport.addEventListener('touchstart',e=>{
  if(dragPt!==null) return;
  if(e.touches.length===1){ panning=true; panStart={x:e.touches[0].clientX-tx, y:e.touches[0].clientY-ty}; }
},{passive:false});

function clientToOrig(cx,cy){
  const r=viewport.getBoundingClientRect();
  const vx=cx-r.left, vy=cy-r.top;
  return { x:Math.round((vx-tx)/scale), y:Math.round((vy-ty)/scale) };
}
function move(e){
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  if(dragPt!==null){
    e.preventDefault();
    const o=clientToOrig(cx,cy);
    pts[dragPt].x=o.x; pts[dragPt].y=o.y;
    redraw();
  } else if(panning){
    e.preventDefault();
    tx=cx-panStart.x; ty=cy-panStart.y;
    applyView();
  }
}
function end(){ dragPt=null; panning=false; }
document.addEventListener('mousemove',move);
document.addEventListener('touchmove',move,{passive:false});
document.addEventListener('mouseup',end);
document.addEventListener('touchend',end);

document.getElementById('opacity').addEventListener('input',e=>{
  canvas.style.opacity=e.target.value/100;
  document.getElementById('opval').textContent=e.target.value+'%';
});
function showCoords(){
  const arr=pts.map(p=>'['+p.x+','+p.y+']');
  document.getElementById('out').textContent=
    '합판 4점 좌표 (2000x1105 기준):\n'+
    'TL(뒤왼): ['+pts[0].x+','+pts[0].y+']\n'+
    'TR(뒤오): ['+pts[1].x+','+pts[1].y+']\n'+
    'BR(앞오): ['+pts[2].x+','+pts[2].y+']\n'+
    'BL(앞왼): ['+pts[3].x+','+pts[3].y+']\n\n'+
    '복사용: ['+arr.join(',')+']';
}
function resetPts(){ pts=[{x:200,y:430},{x:1015,y:415},{x:830,y:520},{x:140,y:500}]; redraw(); }

window.addEventListener('resize',()=>{applyView();redraw();});
let loaded=0;
function onload(){ loaded++; if(loaded>=2){ fitView(); } }
plyImg.onload=onload; bg.onload=onload;
setTimeout(()=>{ if(loaded<2) fitView(); },500);
</script>
